<!doctype html>
<html ng-app="campus360">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="node_modules/angular/angular.js"></script>
    <script src="js/app.js"></script>
    <title>Campus360 Dashboard</title>
  </head>

  <body ng-controller="dashboardController">
    <div>
      <h1>{{collegename || 'College Name'}}</h1>
      <label for="collegename">College Name:</label>
      <input type="text" id="collegename" ng-model="collegename" />
    </div>



    <div>
      <h3>Students</h3>
      <label for="totalstudents">Total Students:</label>
      <input type="number" id="totalstudents" ng-model="totalstudents" />
      <p>Total Students : {{totalstudents}}</p>
      <button ng-click="totalstudents = totalstudents + 1">Add Student</button>
    </div>


    <div>
      <h3>Faculty</h3>
      <label for="totalfaculty">Total Faculty:</label>
      <input type="number" id="totalfaculty" ng-model="totalfaculty" />
      <p>Total Faculty : {{totalfaculty}}</p>
      <button ng-click="totalfaculty = totalfaculty + 1">Add Faculty</button>
    </div>

    <div>
      <h2>Student List</h2>
      <ul>
        <li ng-repeat="student in students">{{student}}</li>
      </ul>
    </div>
  </body>
</html>
